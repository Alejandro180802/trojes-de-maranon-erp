# Optional local Postgres for OFFLINE development.
# The primary dev database is Supabase (see backend/src/TrojesDeMaranon.Api/appsettings.json).
# To use this instead, point ConnectionStrings__DefaultConnection at:
#   Host=localhost;Port=5432;Database=trojes;Username=postgres;Password=postgres
services:
  postgres:
    image: postgres:16
    container_name: trojes-postgres
    environment:
      POSTGRES_DB: trojes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
